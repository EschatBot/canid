  <script>/**
 * AudioAnalyzer — Real-time vocalization classification using Web Audio API
 * 
 * Extracts MFCCs and spectral features to classify dog vocalizations.
 * Rule-based classifier grounded in Yin & McCowan (2004), Pongrácz et al. (2005),
 * and Molnár et al. (2008) research on dog acoustic communication.
 */
class AudioAnalyzer {
  constructor() {
    this.audioContext = null;
    this.analyser = null;
    this.stream = null;
    this.isRunning = false;
    
    // Analysis buffers
    this.fftSize = 2048;
    this.frequencyData = null;
    this.timeData = null;
    
    // MFCC config
    this.numMelFilters = 26;
    this.numMFCCs = 13;
    this.sampleRate = 44100;
    this.melFilterBank = null;
    
    // Vocalization state
    this.currentVocalization = null;
    this.vocalizationHistory = [];
    this.silenceThreshold = 0.02;
    this.onsetThreshold = 0.05;
    this.isVocalizing = false;
    this.vocalizationStart = 0;
    this.silenceStart = 0;
    this.minVocDuration = 80;   // ms
    this.minSilence = 200;      // ms gap to count as separate vocalization
    
    // Rolling analysis window
    this.recentEnergy = [];
    this.recentPitch = [];
    this.maxHistoryLen = 60; // ~1 second at 60fps
    
    // Callbacks
    this.onVocalization = null;
    this.onAudioLevel = null;
  }

  async start() {
    try {
      this.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { 
          echoCancellation: false, 
          noiseSuppression: false, 
          autoGainControl: false 
        } 
      });
      
      this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      this.sampleRate = this.audioContext.sampleRate;
      
      const source = this.audioContext.createMediaStreamSource(this.stream);
      this.analyser = this.audioContext.createAnalyser();
      this.analyser.fftSize = this.fftSize;
      this.analyser.smoothingTimeConstant = 0.3;
      
      source.connect(this.analyser);
      
      this.frequencyData = new Float32Array(this.analyser.frequencyBinCount);
      this.timeData = new Float32Array(this.fftSize);
      
      this.buildMelFilterBank();
      this.isRunning = true;
      
      return true;
    } catch (err) {
      console.error('Audio init failed:', err);
      return false;
    }
  }

  stop() {
    this.isRunning = false;
    if (this.stream) {
      this.stream.getTracks().forEach(t => t.stop());
      this.stream = null;
    }
    if (this.audioContext) {
      this.audioContext.close();
      this.audioContext = null;
    }
  }

  /**
   * Build mel-scale triangular filter bank for MFCC extraction
   */
  buildMelFilterBank() {
    const nyquist = this.sampleRate / 2;
    const numBins = this.analyser.frequencyBinCount;
    
    const hzToMel = (hz) => 2595 * Math.log10(1 + hz / 700);
    const melToHz = (mel) => 700 * (Math.pow(10, mel / 2595) - 1);
    
    const lowMel = hzToMel(80);    // Dog vocalizations start ~80 Hz
    const highMel = hzToMel(8000); // Relevant range for dog sounds
    
    const melPoints = [];
    for (let i = 0; i <= this.numMelFilters + 1; i++) {
      melPoints.push(lowMel + (highMel - lowMel) * i / (this.numMelFilters + 1));
    }
    
    const hzPoints = melPoints.map(m => melToHz(m));
    const binPoints = hzPoints.map(hz => Math.round(hz / nyquist * numBins));
    
    this.melFilterBank = [];
    for (let i = 0; i < this.numMelFilters; i++) {
      const filter = new Float32Array(numBins);
      const start = binPoints[i];
      const center = binPoints[i + 1];
      const end = binPoints[i + 2];
      
      for (let j = start; j < center && j < numBins; j++) {
        filter[j] = (j - start) / (center - start);
      }
      for (let j = center; j < end && j < numBins; j++) {
        filter[j] = (end - j) / (end - center);
      }
      this.melFilterBank.push(filter);
    }
  }

  /**
   * Extract MFCCs from current frequency data
   */
  extractMFCCs() {
    if (!this.melFilterBank) return null;
    
    // Convert dB to power
    const power = this.frequencyData.map(db => Math.pow(10, db / 10));
    
    // Apply mel filter bank
    const melEnergies = this.melFilterBank.map(filter => {
      let energy = 0;
      for (let i = 0; i < power.length; i++) {
        energy += power[i] * filter[i];
      }
      return Math.max(energy, 1e-10);
    });
    
    // Log mel energies
    const logMelEnergies = melEnergies.map(e => Math.log(e));
    
    // DCT-II to get MFCCs
    const mfccs = [];
    for (let i = 0; i < this.numMFCCs; i++) {
      let sum = 0;
      for (let j = 0; j < this.numMelFilters; j++) {
        sum += logMelEnergies[j] * Math.cos(Math.PI * i * (j + 0.5) / this.numMelFilters);
      }
      mfccs.push(sum);
    }
    
    return mfccs;
  }

  /**
   * Estimate fundamental frequency using autocorrelation
   */
  estimatePitch() {
    
    const n = this.timeData.length;
    const minLag = Math.floor(this.sampleRate / 2000); // Max ~2kHz
    const maxLag = Math.floor(this.sampleRate / 50);   // Min ~50 Hz
    
    let bestCorrelation = 0;
    let bestLag = 0;
    
    for (let lag = minLag; lag < maxLag && lag < n / 2; lag++) {
      let correlation = 0;
      let norm1 = 0;
      let norm2 = 0;
      
      for (let i = 0; i < n - lag; i++) {
        correlation += this.timeData[i] * this.timeData[i + lag];
        norm1 += this.timeData[i] * this.timeData[i];
        norm2 += this.timeData[i + lag] * this.timeData[i + lag];
      }
      
      const normFactor = Math.sqrt(norm1 * norm2);
      if (normFactor > 0) {
        correlation /= normFactor;
      }
      
      if (correlation > bestCorrelation) {
        bestCorrelation = correlation;
        bestLag = lag;
      }
    }
    
    if (bestCorrelation > 0.4 && bestLag > 0) {
      return this.sampleRate / bestLag;
    }
    return 0;
  }

  /**
   * Calculate RMS energy
   */
  getRMSEnergy() {
    let sum = 0;
    for (let i = 0; i < this.timeData.length; i++) {
      sum += this.timeData[i] * this.timeData[i];
    }
    return Math.sqrt(sum / this.timeData.length);
  }

  /**
   * Get spectral centroid (brightness of sound)
   */
  getSpectralCentroid() {
    
    let weightedSum = 0;
    let totalEnergy = 0;
    const binWidth = this.sampleRate / this.fftSize;
    
    for (let i = 0; i < this.frequencyData.length; i++) {
      const power = Math.pow(10, this.frequencyData[i] / 10);
      weightedSum += power * (i * binWidth);
      totalEnergy += power;
    }
    
    return totalEnergy > 0 ? weightedSum / totalEnergy : 0;
  }

  /**
   * Get spectral flatness (tonal vs noisy)
   */
  getSpectralFlatness() {
    
    let logSum = 0;
    let linearSum = 0;
    let count = 0;
    
    for (let i = 1; i < this.frequencyData.length; i++) {
      const power = Math.pow(10, this.frequencyData[i] / 10);
      if (power > 0) {
        logSum += Math.log(power);
        linearSum += power;
        count++;
      }
    }
    
    if (count === 0 || linearSum === 0) return 0;
    
    const geometricMean = Math.exp(logSum / count);
    const arithmeticMean = linearSum / count;
    
    return geometricMean / arithmeticMean;
  }

  /**
   * Main analysis tick — call every animation frame
   * Returns current audio features and vocalization classification
   */
  analyze() {
    if (!this.isRunning || !this.analyser) return null;
    
    // Read each buffer once per frame to avoid redundant calls
    this.analyser.getFloatTimeDomainData(this.timeData);
    this.analyser.getFloatFrequencyData(this.frequencyData);
    
    const now = performance.now();
    const energy = this.getRMSEnergy();
    const pitch = this.estimatePitch();
    const centroid = this.getSpectralCentroid();
    const flatness = this.getSpectralFlatness();
    const mfccs = this.extractMFCCs();
    
    // Track rolling stats
    this.recentEnergy.push(energy);
    this.recentPitch.push(pitch);
    if (this.recentEnergy.length > this.maxHistoryLen) this.recentEnergy.shift();
    if (this.recentPitch.length > this.maxHistoryLen) this.recentPitch.shift();
    
    // Onset/offset detection
    if (energy > this.onsetThreshold && !this.isVocalizing) {
      this.isVocalizing = true;
      this.vocalizationStart = now;
    } else if (energy < this.silenceThreshold && this.isVocalizing) {
      if (!this.silenceStart) {
        this.silenceStart = now;
      } else if (now - this.silenceStart > this.minSilence) {
        // End of vocalization
        const duration = this.silenceStart - this.vocalizationStart;
        if (duration > this.minVocDuration) {
          this.recordVocalization(duration, now);
        }
        this.isVocalizing = false;
        this.silenceStart = 0;
      }
    } else if (energy > this.silenceThreshold) {
      this.silenceStart = 0;
    }
    
    // Classify current state
    const classification = this.classifyVocalization(energy, pitch, centroid, flatness, mfccs);
    
    if (this.onAudioLevel) {
      this.onAudioLevel(energy);
    }
    
    return {
      energy,
      pitch,
      centroid,
      flatness,
      mfccs,
      isVocalizing: this.isVocalizing,
      classification,
      frequencyData: this.frequencyData,
      timeData: this.timeData
    };
  }

  recordVocalization(duration, timestamp) {
    const entry = {
      timestamp,
      duration,
      avgPitch: this.recentPitch.filter(p => p > 0).reduce((a, b) => a + b, 0) / 
                Math.max(1, this.recentPitch.filter(p => p > 0).length),
      avgEnergy: this.recentEnergy.reduce((a, b) => a + b, 0) / this.recentEnergy.length
    };
    
    this.vocalizationHistory.push(entry);
    if (this.vocalizationHistory.length > 20) this.vocalizationHistory.shift();
  }

  /**
   * Rule-based vocalization classifier
   * Based on Pongrácz et al. (2005), Yin & McCowan (2004)
   * 
   * Key acoustic parameters:
   * - Pitch: barks 160-2630 Hz, growls 70-360 Hz, whines 300-4000 Hz
   * - Duration: barks 100-500ms, growls >500ms sustained, whines >200ms
   * - Spectral centroid: growls <500Hz, whines >1500Hz, barks mid-range
   * - Repetition rate: play barks fast (>2/sec), alert slower
   */
  classifyVocalization(energy, pitch, centroid, flatness, mfccs) {
    if (energy < this.onsetThreshold) {
      return { type: 'silence', confidence: 1.0, features: {} };
    }
    
    const duration = this.isVocalizing ? 
      performance.now() - this.vocalizationStart : 0;
    
    // Count recent vocalizations (repetition rate)
    const recentWindow = 3000; // last 3 seconds
    const now = performance.now();
    const recentVocs = this.vocalizationHistory.filter(
      v => now - v.timestamp < recentWindow
    ).length;
    const repRate = recentVocs / 3; // per second
    
    let scores = {
      bark: 0,
      whine: 0,
      growl: 0,
      howl: 0,
      yip: 0
    };
    
    // === BARK detection ===
    // Short duration (100-500ms), mid-range pitch, moderate energy
    if (duration > 80 && duration < 600) scores.bark += 0.3;
    if (pitch > 150 && pitch < 2000) scores.bark += 0.2;
    if (centroid > 400 && centroid < 2500) scores.bark += 0.2;
    if (energy > 0.08) scores.bark += 0.15;
    if (flatness < 0.3) scores.bark += 0.15; // Tonal, not noisy
    
    // === GROWL detection ===
    // Low pitch, sustained, low centroid, high energy
    if (pitch > 50 && pitch < 400) scores.growl += 0.3;
    if (duration > 400) scores.growl += 0.25;
    if (centroid < 600) scores.growl += 0.25;
    if (energy > 0.05) scores.growl += 0.1;
    if (flatness > 0.2) scores.growl += 0.1; // More noisy/rough
    
    // === WHINE detection ===
    // High pitch, sustained, high centroid
    if (pitch > 300) scores.whine += 0.25;
    if (pitch > 800) scores.whine += 0.15;
    if (duration > 200) scores.whine += 0.2;
    if (centroid > 1200) scores.whine += 0.2;
    if (flatness < 0.2) scores.whine += 0.1; // Pure tone
    if (energy < 0.15) scores.whine += 0.1; // Usually softer
    
    // === HOWL detection ===
    // Very sustained, pitch modulation, mid-high pitch
    if (duration > 1500) scores.howl += 0.35;
    if (pitch > 200 && pitch < 1500) scores.howl += 0.2;
    if (flatness < 0.15) scores.howl += 0.2; // Very tonal
    if (centroid > 500 && centroid < 2000) scores.howl += 0.15;
    // Check for pitch variation (howls have characteristic frequency sweeps)
    const pitchVariance = this.getPitchVariance();
    if (pitchVariance > 50) scores.howl += 0.1;
    
    // === YIP detection ===
    // Very short, high pitch, high energy burst
    if (duration > 30 && duration < 150) scores.yip += 0.3;
    if (pitch > 500) scores.yip += 0.25;
    if (energy > 0.1) scores.yip += 0.2;
    if (centroid > 1500) scores.yip += 0.15;
    if (repRate > 2) scores.yip += 0.1;
    
    // Find winner
    const entries = Object.entries(scores);
    entries.sort((a, b) => b[1] - a[1]);
    
    const [type, score] = entries[0];
    const confidence = Math.min(1, score);
    
    // Sub-classify bark type based on Pongrácz et al.
    let subtype = null;
    if (type === 'bark') {
      if (repRate > 2 && pitch > 400) subtype = 'play';
      else if (repRate < 1 && energy > 0.12 && pitch < 500) subtype = 'warning';
      else if (repRate > 1 && repRate < 3) subtype = 'alert';
      else if (repRate < 0.5 && duration > 300) subtype = 'demand';
      else subtype = 'general';
    }
    
    const result = {
      type,
      subtype,
      confidence,
      features: {
        energy: Math.round(energy * 1000) / 1000,
        pitch: Math.round(pitch),
        centroid: Math.round(centroid),
        flatness: Math.round(flatness * 1000) / 1000,
        duration: Math.round(duration),
        repetitionRate: Math.round(repRate * 10) / 10
      }
    };
    
    if (confidence > 0.3 && type !== 'silence' && this.onVocalization) {
      this.onVocalization(result);
    }
    
    return result;
  }

  getPitchVariance() {
    const pitches = this.recentPitch.filter(p => p > 0);
    if (pitches.length < 3) return 0;
    const mean = pitches.reduce((a, b) => a + b, 0) / pitches.length;
    const variance = pitches.reduce((sum, p) => sum + Math.pow(p - mean, 2), 0) / pitches.length;
    return Math.sqrt(variance);
  }

  /**
   * Get waveform data for visualization
   */
  getWaveformData() {
    if (!this.analyser) return null;
    const data = new Uint8Array(this.analyser.frequencyBinCount);
    this.analyser.getByteFrequencyData(data);
    return data;
  }
}

// Export for non-module usage
window.AudioAnalyzer = AudioAnalyzer;

/**
 * BodyAnalyzer — Dog body language detection using TensorFlow.js
 * 
 * Uses COCO-SSD for dog detection and bounding box extraction.
 * Then applies rule-based posture analysis on the detected region.
 * 
 * Body language mapping based on:
 * - Rugaas (2006) "On Talking Terms with Dogs: Calming Signals"
 * - Handelman (2008) "Canine Behavior: A Photo Illustrated Handbook"
 * - Horowitz (2009) ethogram for domestic dog behavior
 */
class BodyAnalyzer {
  constructor() {
    this.model = null;
    this.isReady = false;
    this.isRunning = false;
    this.video = null;
    this.canvas = null;
    this.ctx = null;
    
    // Detection state
    this.lastDetection = null;
    this.detectionHistory = [];
    this.maxHistory = 30;
    
    // Analysis canvas for pixel-level analysis
    this.analysisCanvas = null;
    this.analysisCtx = null;
    
    // Motion tracking
    this.previousFrame = null;
    this.motionHistory = [];
    
    // Callbacks
    this.onDetection = null;
    this.onBodyLanguage = null;
    
    // Throttle detection to ~10 FPS for performance
    this.lastDetectionTime = 0;
    this.detectionInterval = 100; // ms
  }

  async init(videoElement, overlayCanvas) {
    this.video = videoElement;
    this.canvas = overlayCanvas;
    this.ctx = overlayCanvas.getContext('2d');
    
    // Off-screen canvas for analysis
    this.analysisCanvas = document.createElement('canvas');
    this.analysisCanvas.width = 320;
    this.analysisCanvas.height = 240;
    this.analysisCtx = this.analysisCanvas.getContext('2d', { willReadFrequently: true });
    
    try {
      // Guard: check TensorFlow.js and COCO-SSD loaded from CDN
      if (typeof cocoSsd === 'undefined') {
        console.warn('COCO-SSD library not available — video analysis disabled');
        this.showModelError('Vision model unavailable — video analysis disabled. Check your connection and reload.');
        return false;
      }
      // Load COCO-SSD model (detects 'dog' class among others)
      this.model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
      this.isReady = true;
      console.log('COCO-SSD model loaded');
      return true;
    } catch (err) {
      console.error('Model load failed:', err);
      this.showModelError('Vision model failed to load — video analysis disabled.');
      return false;
    }
  }

  showModelError(message) {
    const strip = document.getElementById('audio-strip');
    if (strip) {
      let notice = document.getElementById('model-error-notice');
      if (!notice) {
        notice = document.createElement('div');
        notice.id = 'model-error-notice';
        notice.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(244,63,94,0.12);color:var(--rose);font-size:0.72rem;font-weight:600;padding:0 14px;text-align:center;z-index:2;pointer-events:none;border-radius:inherit;';
        strip.style.position = 'relative';
        strip.appendChild(notice);
      }
      notice.textContent = '⚠ ' + message;
    }
  }

  start() {
    this.isRunning = true;
  }

  stop() {
    this.isRunning = false;
  }

  /**
   * Main analysis tick
   * Returns detected dogs and body language assessment
   */
  async analyze() {
    if (!this.isRunning || !this.isReady || !this.video.videoWidth) return null;
    
    const now = performance.now();
    if (now - this.lastDetectionTime < this.detectionInterval) {
      return this.lastDetection; // Return cached result between frames
    }
    this.lastDetectionTime = now;
    
    try {
      // Run object detection
      const predictions = await this.model.detect(this.video);
      
      // Filter for dogs (COCO class)
      const dogs = predictions.filter(p => p.class === 'dog' && p.score > 0.3);
      
      if (dogs.length === 0) {
        this.lastDetection = { detected: false, dogs: [] };
        return this.lastDetection;
      }
      
      // Analyze each detected dog
      const analyses = dogs.map(dog => this.analyzeDogPosture(dog));
      
      // Track motion between frames
      this.trackMotion();
      
      // Combine posture + motion analysis
      const results = analyses.map((analysis, i) => ({
        bbox: dogs[i].bbox,
        detectionConfidence: dogs[i].score,
        ...analysis,
        motion: this.getMotionAssessment()
      }));
      
      // Store in history
      this.detectionHistory.push({ timestamp: now, results });
      if (this.detectionHistory.length > this.maxHistory) {
        this.detectionHistory.shift();
      }
      
      this.lastDetection = { detected: true, dogs: results };
      
      if (this.onDetection) {
        this.onDetection(this.lastDetection);
      }
      
      return this.lastDetection;
    } catch (err) {
      console.error('Detection error:', err);
      return null;
    }
  }

  /**
   * Analyze dog posture from bounding box region
   * Uses aspect ratio, position in frame, and pixel analysis
   */
  analyzeDogPosture(detection) {
    const [x, y, width, height] = detection.bbox;
    const aspectRatio = width / height;
    const relativeSize = (width * height) / (this.video.videoWidth * this.video.videoHeight);
    
    // Draw to analysis canvas for pixel inspection
    this.analysisCtx.drawImage(
      this.video,
      x, y, width, height,
      0, 0, this.analysisCanvas.width, this.analysisCanvas.height
    );
    
    const posture = this.assessPosture(aspectRatio, width, height, x, y);
    const bodyRegions = this.analyzeBodyRegions();
    
    return {
      posture,
      bodyRegions,
      aspectRatio: Math.round(aspectRatio * 100) / 100,
      relativeSize: Math.round(relativeSize * 10000) / 10000
    };
  }

  /**
   * Assess overall body posture from bounding box geometry
   * 
   * Key heuristics:
   * - Play bow: wide aspect ratio, low center of mass in upper portion
   * - Cowering: small relative size, low aspect ratio (compressed)
   * - Standing alert: tall aspect ratio, large relative size
   * - Lying down: very wide aspect ratio, low vertical position
   */
  assessPosture(aspectRatio, width, height, x, y) {
    const signals = [];
    let scores = {
      playBow: 0,
      standing: 0,
      sitting: 0,
      lyingDown: 0,
      cowering: 0,
      stiffUpright: 0
    };
    
    const frameBottom = this.video.videoHeight;
    const bottomEdge = y + height;
    const isNearBottom = bottomEdge > frameBottom * 0.7;
    
    // Play bow: wide, front low/rear high
    // Aspect ratio typically 1.5-2.5, dog fills lower portion
    if (aspectRatio > 1.4 && aspectRatio < 2.8) {
      scores.playBow += 0.3;
      signals.push('wide_posture');
    }
    if (isNearBottom && aspectRatio > 1.3) {
      scores.playBow += 0.2;
    }
    
    // Standing: moderate aspect ratio ~1.0-1.5
    if (aspectRatio > 0.8 && aspectRatio < 1.6) {
      scores.standing += 0.3;
    }
    
    // Stiff upright: tall, upright posture
    if (aspectRatio < 1.2 && aspectRatio > 0.6) {
      scores.stiffUpright += 0.25;
      signals.push('upright_posture');
    }
    
    // Sitting: aspect ratio near 1.0, weighted toward bottom
    if (aspectRatio > 0.7 && aspectRatio < 1.3) {
      scores.sitting += 0.25;
    }
    
    // Lying down: very wide aspect ratio
    if (aspectRatio > 2.0) {
      scores.lyingDown += 0.4;
      signals.push('low_wide_body');
    }
    
    // Cowering: small, compressed
    if (aspectRatio < 0.9 && height < this.video.videoHeight * 0.3) {
      scores.cowering += 0.3;
      signals.push('compressed_body');
    }
    
    // Find best match
    const entries = Object.entries(scores);
    entries.sort((a, b) => b[1] - a[1]);
    
    return {
      type: entries[0][0],
      confidence: Math.min(1, entries[0][1]),
      scores,
      signals
    };
  }

  /**
   * Analyze body regions for additional signals
   * Splits the detection bounding box into head/body/tail regions
   * Uses color variance and edge detection as proxies
   */
  analyzeBodyRegions() {
    const w = this.analysisCanvas.width;
    const h = this.analysisCanvas.height;
    
    try {
      const imageData = this.analysisCtx.getImageData(0, 0, w, h);
      const data = imageData.data;
      
      // Split into vertical thirds (head, body, rear)
      // and horizontal halves (upper, lower)
      const regions = {
        headUpper: this.getRegionStats(data, w, 0, 0, Math.floor(w / 3), Math.floor(h / 2)),
        headLower: this.getRegionStats(data, w, 0, Math.floor(h / 2), Math.floor(w / 3), h),
        bodyUpper: this.getRegionStats(data, w, Math.floor(w / 3), 0, Math.floor(2 * w / 3), Math.floor(h / 2)),
        bodyLower: this.getRegionStats(data, w, Math.floor(w / 3), Math.floor(h / 2), Math.floor(2 * w / 3), h),
        rearUpper: this.getRegionStats(data, w, Math.floor(2 * w / 3), 0, w, Math.floor(h / 2)),
        rearLower: this.getRegionStats(data, w, Math.floor(2 * w / 3), Math.floor(h / 2), w, h)
      };
      
      // Infer tail position from rear region activity
      const tailSignals = [];
      const rearActivity = regions.rearUpper.edgeDensity + regions.rearLower.edgeDensity;
      
      if (regions.rearUpper.edgeDensity > regions.rearLower.edgeDensity * 1.5) {
        tailSignals.push('tail_up');
      } else if (regions.rearLower.edgeDensity > regions.rearUpper.edgeDensity * 1.5) {
        tailSignals.push('tail_low');
      }
      
      // Head position inference
      const headSignals = [];
      if (regions.headUpper.edgeDensity > regions.headLower.edgeDensity) {
        headSignals.push('head_up');
      } else {
        headSignals.push('head_low');
      }
      
      return {
        tailSignals,
        headSignals,
        regions
      };
    } catch (e) {
      return { tailSignals: [], headSignals: [], regions: {} };
    }
  }

  /**
   * Get statistics for a sub-region of the image
   */
  getRegionStats(data, imageWidth, x1, y1, x2, y2) {
    let totalBrightness = 0;
    let edgeCount = 0;
    let pixelCount = 0;
    
    for (let y = y1; y < y2; y++) {
      for (let x = x1; x < x2; x++) {
        const idx = (y * imageWidth + x) * 4;
        const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
        totalBrightness += brightness;
        pixelCount++;
        
        // Simple edge detection (compare with neighbor)
        if (x < x2 - 1 && y < y2 - 1) {
          const rightIdx = (y * imageWidth + x + 1) * 4;
          const belowIdx = ((y + 1) * imageWidth + x) * 4;
          const rightBright = (data[rightIdx] + data[rightIdx + 1] + data[rightIdx + 2]) / 3;
          const belowBright = (data[belowIdx] + data[belowIdx + 1] + data[belowIdx + 2]) / 3;
          
          if (Math.abs(brightness - rightBright) > 30 || Math.abs(brightness - belowBright) > 30) {
            edgeCount++;
          }
        }
      }
    }
    
    return {
      avgBrightness: pixelCount > 0 ? totalBrightness / pixelCount : 0,
      edgeDensity: pixelCount > 0 ? edgeCount / pixelCount : 0
    };
  }

  /**
   * Track motion between frames using simple frame differencing
   */
  trackMotion() {
    const w = this.analysisCanvas.width;
    const h = this.analysisCanvas.height;
    
    try {
      const currentFrame = this.analysisCtx.getImageData(0, 0, w, h);
      
      if (this.previousFrame) {
        let motionPixels = 0;
        let totalPixels = w * h;
        
        for (let i = 0; i < currentFrame.data.length; i += 16) { // Sample every 4th pixel
          const diff = Math.abs(currentFrame.data[i] - this.previousFrame.data[i]) +
                      Math.abs(currentFrame.data[i + 1] - this.previousFrame.data[i + 1]) +
                      Math.abs(currentFrame.data[i + 2] - this.previousFrame.data[i + 2]);
          
          if (diff > 60) motionPixels++;
        }
        
        const motionLevel = motionPixels / (totalPixels / 4);
        this.motionHistory.push(motionLevel);
        if (this.motionHistory.length > 30) this.motionHistory.shift();
      }
      
      this.previousFrame = currentFrame;
    } catch (e) {
      // Canvas tainted or other error — ignore
    }
  }

  /**
   * Assess motion patterns
   * - High, regular = wagging tail, bouncy play
   * - Low = still/frozen (alert or relaxed)
   * - Erratic = pacing (anxiety)
   */
  getMotionAssessment() {
    if (this.motionHistory.length < 5) {
      return { level: 'unknown', value: 0, pattern: 'insufficient_data' };
    }
    
    const avg = this.motionHistory.reduce((a, b) => a + b, 0) / this.motionHistory.length;
    const recent = this.motionHistory.slice(-10);
    const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
    
    // Check for rhythmic motion (tail wagging produces oscillating motion signal)
    const variance = recent.reduce((sum, v) => sum + Math.pow(v - recentAvg, 2), 0) / recent.length;
    const isRhythmic = variance > 0.001 && variance < 0.05;
    
    let level, pattern;
    
    if (avg < 0.01) {
      level = 'still';
      pattern = 'frozen_or_resting';
    } else if (avg < 0.05) {
      level = 'low';
      pattern = isRhythmic ? 'gentle_movement' : 'minimal_movement';
    } else if (avg < 0.15) {
      level = 'moderate';
      pattern = isRhythmic ? 'rhythmic_wagging' : 'active';
    } else {
      level = 'high';
      pattern = isRhythmic ? 'excited_wagging' : 'vigorous_movement';
    }
    
    return { level, value: Math.round(avg * 1000) / 1000, pattern };
  }

  /**
   * Draw premium detection overlay on canvas
   * Soft glow corners, translucent fills, elegant labels
   */
  drawOverlay(showOverlay = true) {
    if (!this.ctx || !this.lastDetection) return;

    this.canvas.width = this.video.videoWidth;
    this.canvas.height = this.video.videoHeight;
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

    if (!showOverlay || !this.lastDetection.detected) return;

    this.lastDetection.dogs.forEach(dog => {
      const [x, y, w, h] = dog.bbox;
      const accent = 'rgba(59, 130, 246, ';
      const cornerLen = Math.min(24, w * 0.12, h * 0.12);
      const pad = 4;

      // Soft fill
      ctx.fillStyle = accent + '0.06)';
      ctx.beginPath();
      ctx.roundRect(x - pad, y - pad, w + pad * 2, h + pad * 2, 8);
      ctx.fill();

      // Subtle border
      ctx.strokeStyle = accent + '0.18)';
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.roundRect(x - pad, y - pad, w + pad * 2, h + pad * 2, 8);
      ctx.stroke();

      // Glowing corner brackets
      ctx.strokeStyle = accent + '0.7)';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = accent + '0.4)';
      ctx.shadowBlur = 8;
      ctx.lineCap = 'round';

      const corners = [
        [[x, y + cornerLen], [x, y], [x + cornerLen, y]],
        [[x + w - cornerLen, y], [x + w, y], [x + w, y + cornerLen]],
        [[x, y + h - cornerLen], [x, y + h], [x + cornerLen, y + h]],
        [[x + w - cornerLen, y + h], [x + w, y + h], [x + w, y + h - cornerLen]]
      ];

      corners.forEach(pts => {
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        ctx.lineTo(pts[1][0], pts[1][1]);
        ctx.lineTo(pts[2][0], pts[2][1]);
        ctx.stroke();
      });

      ctx.shadowBlur = 0;
      ctx.lineCap = 'butt';

      // Posture label — pill badge
      if (dog.posture) {
        const label = dog.posture.type.replace(/([A-Z])/g, ' $1').trim().toUpperCase();
        ctx.font = '600 11px Inter, -apple-system, sans-serif';
        const tw = ctx.measureText(label).width;
        const pillW = tw + 16;
        const pillH = 22;
        const pillX = x;
        const pillY = y - pillH - 6;

        ctx.fillStyle = accent + '0.85)';
        ctx.beginPath();
        ctx.roundRect(pillX, pillY, pillW, pillH, 6);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.fillText(label, pillX + 8, pillY + 15);
      }

      // Motion label — smaller, bottom-right
      if (dog.motion && dog.motion.level !== 'unknown') {
        const ml = dog.motion.pattern.replace(/_/g, ' ');
        ctx.font = '500 10px Inter, -apple-system, sans-serif';
        const mtw = ctx.measureText(ml).width;
        const mpW = mtw + 12;
        const mpH = 18;
        const mpX = x + w - mpW;
        const mpY = y + h + 6;

        ctx.fillStyle = 'rgba(16, 185, 129, 0.75)';
        ctx.beginPath();
        ctx.roundRect(mpX, mpY, mpW, mpH, 5);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.fillText(ml, mpX + 6, mpY + 13);
      }
    });
  }
}

  <script>/**
 * BehaviorFusion — Multi-signal behavioral state assessment
 * 
 * Fuses audio classification, body language detection, and user-provided
 * context into a unified behavioral state with confidence levels.
 * 
 * Behavioral state mapping based on:
 * - Horowitz & Hecht (2016) "Examining Dog-Human Play"
 * - Overall (2013) "Manual of Clinical Behavioral Medicine for Dogs and Cats"
 * - Mills et al. (2010) "The Encyclopedia of Applied Animal Behaviour"
 * - Rugaas (2006) calming signals framework
 */
class BehaviorFusion {
  constructor() {
    this.currentState = null;
    this.stateHistory = [];
    this.maxHistory = 100;
    
    // Smoothing — prevent rapid flickering between states
    this.stateBuffer = [];
    this.bufferSize = 8;  // ~0.5s at 15fps assessment rate
    
    // State definitions with icons
    this.states = {
      playful: {
        label: 'Playful',
        icon: '🎾',
        need: 'Wants to play — engage with toys or chase',
        cssClass: 'state-playful',
        color: '#3ddc84'
      },
      anxious: {
        label: 'Anxious / Stressed',
        icon: '😰',
        need: 'Needs reassurance — speak calmly, reduce stimulation',
        cssClass: 'state-anxious',
        color: '#ffc107'
      },
      alert: {
        label: 'Alert / Guarding',
        icon: '🔔',
        need: 'Alerting you to something — acknowledge, then redirect',
        cssClass: 'state-alert',
        color: '#ff8a50'
      },
      fearful: {
        label: 'Fearful',
        icon: '⚠️',
        need: 'Scared — give space, don\'t force interaction, offer safe retreat',
        cssClass: 'state-fearful',
        color: '#ff5252'
      },
      relaxed: {
        label: 'Relaxed / Content',
        icon: '😌',
        need: 'Content — maintain current environment',
        cssClass: 'state-relaxed',
        color: '#03dac6'
      },
      attention: {
        label: 'Wants Attention',
        icon: '👀',
        need: 'Seeking interaction — respond or set boundary',
        cssClass: 'state-attention',
        color: '#bb86fc'
      },
      frustrated: {
        label: 'Frustrated',
        icon: '😤',
        need: 'Frustrated — identify and remove stressor, redirect energy',
        cssClass: 'state-frustrated',
        color: '#ff5252'
      },
      excited: {
        label: 'Excited / Anticipating',
        icon: '⚡',
        need: 'High arousal — channel energy, may need calming',
        cssClass: 'state-playful',
        color: '#3ddc84'
      }
    };

    // Context modifiers — how context shifts probability of states
    this.contextWeights = {
      just_got_home: {
        excited: 0.3, playful: 0.2, attention: 0.2,
        anxious: -0.1, alert: -0.2
      },
      feeding_time: {
        excited: 0.3, attention: 0.2, frustrated: 0.1,
        relaxed: -0.2, alert: -0.1
      },
      stranger: {
        alert: 0.35, anxious: 0.15, fearful: 0.1,
        relaxed: -0.3, playful: -0.2
      },
      park: {
        playful: 0.25, excited: 0.2, relaxed: 0.1,
        fearful: -0.1
      },
      none: {} // No modifier
    };
  }

  /**
   * Main fusion method — combine all signals into behavioral assessment
   * 
   * @param {Object} audioResult - From AudioAnalyzer
   * @param {Object} bodyResult - From BodyAnalyzer
   * @param {string} context - Current context selection
   * @returns {Object} Behavioral assessment
   */
  assess(audioResult, bodyResult, context = 'none') {
    const scores = {
      playful: 0,
      anxious: 0,
      alert: 0,
      fearful: 0,
      relaxed: 0,
      attention: 0,
      frustrated: 0,
      excited: 0
    };
    
    const evidence = [];
    
    // === Audio signals ===
    if (audioResult && audioResult.classification) {
      const audio = audioResult.classification;
      this.applyAudioSignals(audio, scores, evidence);
    }
    
    // === Body language signals ===
    if (bodyResult && bodyResult.detected && bodyResult.dogs.length > 0) {
      const dog = bodyResult.dogs[0]; // Primary dog
      this.applyBodySignals(dog, scores, evidence);
    }
    
    // === Context modifiers ===
    if (context && this.contextWeights[context]) {
      const weights = this.contextWeights[context];
      for (const [state, modifier] of Object.entries(weights)) {
        scores[state] = (scores[state] || 0) + modifier;
        if (modifier > 0.1) {
          evidence.push({
            type: 'context',
            signal: `Context: ${context.replace(/_/g, ' ')}`,
            weight: modifier
          });
        }
      }
    }
    
    // === Normalize and determine state ===
    // Clamp scores to [0, 1]
    for (const key in scores) {
      scores[key] = Math.max(0, Math.min(1, scores[key]));
    }
    
    // Find top state
    const entries = Object.entries(scores);
    entries.sort((a, b) => b[1] - a[1]);
    
    const [topState, topScore] = entries[0];
    const [secondState, secondScore] = entries[1] || ['', 0];
    
    // Confidence is based on margin between top and second state
    const rawConfidence = topScore > 0 ? 
      Math.min(1, topScore * (1 + (topScore - secondScore))) : 0;
    
    // Buffer for smoothing
    this.stateBuffer.push(topState);
    if (this.stateBuffer.length > this.bufferSize) this.stateBuffer.shift();
    
    // Use mode of buffer as final state (prevents flickering)
    const smoothedState = this.getModeState();
    
    // Check if we have enough signal to make an assessment
    const hasSignal = evidence.length > 0;
    
    if (!hasSignal) {
      return {
        state: null,
        confidence: 0,
        evidence: [],
        scores,
        hasSignal: false
      };
    }
    
    const confidence = Math.round(rawConfidence * 100);
    const stateInfo = this.states[smoothedState] || this.states.relaxed;
    
    const assessment = {
      state: smoothedState,
      label: stateInfo.label,
      icon: stateInfo.icon,
      need: stateInfo.need,
      cssClass: stateInfo.cssClass,
      color: stateInfo.color,
      confidence,
      evidence: evidence.sort((a, b) => b.weight - a.weight).slice(0, 6),
      scores,
      hasSignal: true,
      timestamp: Date.now()
    };
    
    // Record state change
    if (!this.currentState || this.currentState.state !== smoothedState) {
      this.stateHistory.push(assessment);
      if (this.stateHistory.length > this.maxHistory) this.stateHistory.shift();
    }
    
    this.currentState = assessment;
    return assessment;
  }

  /**
   * Map audio classifications to behavioral states
   */
  applyAudioSignals(audio, scores, evidence) {
    if (audio.type === 'silence') return;
    
    const conf = audio.confidence;
    
    switch (audio.type) {
      case 'bark':
        switch (audio.subtype) {
          case 'play':
            scores.playful += 0.35 * conf;
            scores.excited += 0.2 * conf;
            evidence.push({ type: 'audio', signal: 'Short repetitive barks (play)', weight: 0.35 * conf });
            break;
          case 'warning':
            scores.alert += 0.4 * conf;
            scores.fearful += 0.1 * conf;
            evidence.push({ type: 'audio', signal: 'Low sustained bark (warning)', weight: 0.4 * conf });
            break;
          case 'alert':
            scores.alert += 0.35 * conf;
            scores.attention += 0.15 * conf;
            evidence.push({ type: 'audio', signal: 'Alert barking', weight: 0.35 * conf });
            break;
          case 'demand':
            scores.attention += 0.35 * conf;
            scores.frustrated += 0.15 * conf;
            evidence.push({ type: 'audio', signal: 'Single bark with pause (demand)', weight: 0.35 * conf });
            break;
          default:
            scores.alert += 0.2 * conf;
            evidence.push({ type: 'audio', signal: 'Barking detected', weight: 0.2 * conf });
        }
        break;
        
      case 'whine':
        scores.anxious += 0.35 * conf;
        scores.attention += 0.2 * conf;
        scores.fearful += 0.1 * conf;
        evidence.push({ type: 'audio', signal: 'Whining / whimpering', weight: 0.35 * conf });
        break;
        
      case 'growl':
        scores.alert += 0.3 * conf;
        scores.fearful += 0.2 * conf;
        scores.frustrated += 0.15 * conf;
        evidence.push({ type: 'audio', signal: 'Growling', weight: 0.3 * conf });
        break;
        
      case 'howl':
        scores.anxious += 0.25 * conf;
        scores.attention += 0.2 * conf;
        evidence.push({ type: 'audio', signal: 'Howling', weight: 0.25 * conf });
        break;
        
      case 'yip':
        scores.playful += 0.25 * conf;
        scores.excited += 0.25 * conf;
        evidence.push({ type: 'audio', signal: 'Yipping / yelping', weight: 0.25 * conf });
        break;
    }
    
    // Repetition rate signals
    if (audio.features && audio.features.repetitionRate > 2.5) {
      scores.excited += 0.15;
      scores.playful += 0.1;
      evidence.push({ type: 'audio', signal: 'Rapid vocal repetition', weight: 0.15 });
    }
    
    // High energy vocalization
    if (audio.features && audio.features.energy > 0.15) {
      scores.alert += 0.1;
      scores.excited += 0.1;
    }
  }

  /**
   * Map body language signals to behavioral states
   */
  applyBodySignals(dog, scores, evidence) {
    // Posture signals
    if (dog.posture) {
      const postConf = dog.posture.confidence;
      
      switch (dog.posture.type) {
        case 'playBow':
          scores.playful += 0.45 * postConf;
          scores.excited += 0.15 * postConf;
          evidence.push({ type: 'visual', signal: 'Play bow detected', weight: 0.45 * postConf });
          break;
        case 'cowering':
          scores.fearful += 0.4 * postConf;
          scores.anxious += 0.2 * postConf;
          evidence.push({ type: 'visual', signal: 'Cowering posture', weight: 0.4 * postConf });
          break;
        case 'stiffUpright':
          scores.alert += 0.35 * postConf;
          evidence.push({ type: 'visual', signal: 'Stiff upright posture', weight: 0.35 * postConf });
          break;
        case 'lyingDown':
          scores.relaxed += 0.35 * postConf;
          evidence.push({ type: 'visual', signal: 'Lying down', weight: 0.35 * postConf });
          break;
        case 'standing':
          scores.alert += 0.1 * postConf;
          scores.relaxed += 0.1 * postConf;
          break;
        case 'sitting':
          scores.relaxed += 0.2 * postConf;
          scores.attention += 0.15 * postConf;
          evidence.push({ type: 'visual', signal: 'Sitting posture', weight: 0.2 * postConf });
          break;
      }
    }
    
    // Motion signals
    if (dog.motion) {
      switch (dog.motion.pattern) {
        case 'rhythmic_wagging':
          scores.playful += 0.2;
          scores.relaxed += 0.15;
          evidence.push({ type: 'visual', signal: 'Rhythmic movement (possible tail wag)', weight: 0.2 });
          break;
        case 'excited_wagging':
          scores.excited += 0.25;
          scores.playful += 0.15;
          evidence.push({ type: 'visual', signal: 'Vigorous rhythmic movement', weight: 0.25 });
          break;
        case 'vigorous_movement':
          scores.excited += 0.2;
          scores.playful += 0.1;
          scores.anxious += 0.1; // Could be pacing
          evidence.push({ type: 'visual', signal: 'High activity level', weight: 0.2 });
          break;
        case 'frozen_or_resting':
          scores.relaxed += 0.15;
          scores.alert += 0.1; // Freeze can mean alert
          evidence.push({ type: 'visual', signal: 'Still / frozen', weight: 0.15 });
          break;
      }
    }
    
    // Body region signals
    if (dog.bodyRegions) {
      if (dog.bodyRegions.tailSignals.includes('tail_up')) {
        scores.alert += 0.1;
        scores.playful += 0.1;
        evidence.push({ type: 'visual', signal: 'Tail position: up', weight: 0.1 });
      }
      if (dog.bodyRegions.tailSignals.includes('tail_low')) {
        scores.anxious += 0.15;
        scores.fearful += 0.1;
        evidence.push({ type: 'visual', signal: 'Tail position: low', weight: 0.15 });
      }
      if (dog.bodyRegions.headSignals.includes('head_up')) {
        scores.alert += 0.1;
      }
      if (dog.bodyRegions.headSignals.includes('head_low')) {
        scores.anxious += 0.05;
        scores.relaxed += 0.05;
      }
    }
  }

  /**
   * Get mode (most common) state from buffer
   */
  getModeState() {
    if (this.stateBuffer.length === 0) return 'relaxed';
    
    const counts = {};
    this.stateBuffer.forEach(s => {
      counts[s] = (counts[s] || 0) + 1;
    });
    
    let maxCount = 0;
    let mode = this.stateBuffer[this.stateBuffer.length - 1]; // Default to latest
    
    for (const [state, count] of Object.entries(counts)) {
      if (count > maxCount) {
        maxCount = count;
        mode = state;
      }
    }
    
    return mode;
  }

  /**
   * Get formatted history for UI
   */
  getHistory() {
    return this.stateHistory.map(entry => ({
      state: entry.state,
      label: entry.label,
      icon: entry.icon,
      confidence: entry.confidence,
      need: entry.need,
      timestamp: entry.timestamp,
      topEvidence: entry.evidence.slice(0, 2).map(e => e.signal).join(', ')
    }));
  }
}

window.BehaviorFusion = BehaviorFusion;

  <script>/* roundRect polyfill for older browsers */
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.beginPath();
    this.moveTo(x + r[0], y);
    this.arcTo(x + w, y, x + w, y + h, r[1]);
    this.arcTo(x + w, y + h, x, y + h, r[2]);
    this.arcTo(x, y + h, x, y, r[3]);
    this.arcTo(x, y, x + w, y, r[0]);
    this.closePath();
    return this;
  };
}

/**
 * UI Manager — Layered 3D / Paper-Cut rendering
 * 3D audio bars, depth-aware overlays, confidence ring, history
 */
class UI {
  constructor() {
    // Camera
    this.cameraFeed = document.getElementById('camera-feed');
    this.overlayCanvas = document.getElementById('overlay-canvas');
    this.startPrompt = document.getElementById('start-prompt');
    this.scanOverlay = document.getElementById('scan-overlay');
    this.detectionBadges = document.getElementById('detection-badges');
    this.detectionPulses = document.getElementById('detection-pulses');
    this.statusDot = document.getElementById('status-dot');

    // Audio
    this.audioCanvas = document.getElementById('audio-canvas');
    this.audioCtx = this.audioCanvas.getContext('2d');
    this.vocalizationType = document.getElementById('vocalization-type');

    // Assessment
    this.assessmentCard = document.getElementById('assessment-card');
    this.stateIcon = document.getElementById('state-icon');
    this.stateLabel = document.getElementById('state-label');
    this.stateNeed = document.getElementById('state-need');
    this.confidenceArc = document.getElementById('confidence-arc');
    this.confidencePct = document.getElementById('confidence-pct');
    this.evidenceList = document.getElementById('evidence-list');

    // History
    this.historyLog = document.getElementById('history-log');

    // Settings
    this.settingsSheet = document.getElementById('settings-sheet');
    this.cameraSelect = document.getElementById('camera-select');

    // Arc geometry
    this.arcRadius = 34;
    this.arcCircumference = 2 * Math.PI * this.arcRadius;

    // Audio viz state
    this.prevBars = null;
    this.vizColor = { r: 6, g: 182, b: 212 };       // teal
    this.targetVizColor = { r: 6, g: 182, b: 212 };
    this.vizColorDark = { r: 4, g: 120, b: 140 };
    this.targetVizColorDark = { r: 4, g: 120, b: 140 };

    this.initEmptyHistory();
  }

  // ===== Audio visualization — 3D bars with gradient + shadow =====

  drawAudioVisualization(waveformData, energy, isVocalizing) {
    const canvas = this.audioCanvas;
    const ctx = this.audioCtx;
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const w = rect.width;
    const h = rect.height;
    ctx.clearRect(0, 0, w, h);

    // Lerp colors
    for (const k of ['r', 'g', 'b']) {
      this.vizColor[k] += (this.targetVizColor[k] - this.vizColor[k]) * 0.07;
      this.vizColorDark[k] += (this.targetVizColorDark[k] - this.vizColorDark[k]) * 0.07;
    }
    const c = this.vizColor;
    const cd = this.vizColorDark;
    const cr = Math.round(c.r), cg = Math.round(c.g), cb = Math.round(c.b);
    const dr = Math.round(cd.r), dg = Math.round(cd.g), db = Math.round(cd.b);

    if (!waveformData || !waveformData.length) {
      // Idle: subtle midline
      ctx.strokeStyle = `rgba(${cr},${cg},${cb}, 0.1)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      return;
    }

    const barCount = 64;
    const step = Math.max(1, Math.floor(waveformData.length / barCount));
    const totalW = w / barCount;
    const barW = totalW * 0.6;

    if (!this.prevBars || this.prevBars.length !== barCount) {
      this.prevBars = new Float32Array(barCount);
    }

    for (let i = 0; i < barCount; i++) {
      const raw = waveformData[i * step] / 255;
      this.prevBars[i] += (raw - this.prevBars[i]) * 0.3;
      const val = this.prevBars[i];
      const barH = Math.max(2, val * h * 0.78);
      const x = i * totalW + (totalW - barW) / 2;
      const y = (h - barH) / 2;

      const alpha = isVocalizing ? (0.35 + val * 0.65) : (0.12 + val * 0.3);

      // Bar shadow (dark underneath for depth)
      ctx.fillStyle = `rgba(0,0,0, ${alpha * 0.35})`;
      ctx.beginPath();
      ctx.roundRect(x + 1, y + 2, barW, barH, 2);
      ctx.fill();

      // Main bar — vertical gradient (light top → dark bottom)
      const grad = ctx.createLinearGradient(x, y, x, y + barH);
      grad.addColorStop(0, `rgba(${cr},${cg},${cb}, ${alpha})`);
      grad.addColorStop(0.4, `rgba(${cr},${cg},${cb}, ${alpha * 0.9})`);
      grad.addColorStop(1, `rgba(${dr},${dg},${db}, ${alpha * 0.7})`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, barW, barH, 2);
      ctx.fill();

      // Top highlight (1px lighter edge for 3D volume)
      if (barH > 4) {
        ctx.fillStyle = `rgba(255,255,255, ${alpha * 0.25})`;
        ctx.fillRect(x + 1, y, barW - 2, 1.5);
      }

      // Glow on loud bars
      if (val > 0.55 && isVocalizing) {
        ctx.shadowColor = `rgba(${cr},${cg},${cb}, ${(val - 0.4) * 0.5})`;
        ctx.shadowBlur = 10;
        ctx.fillStyle = `rgba(${cr},${cg},${cb}, 0.08)`;
        ctx.fillRect(x, y, barW, barH);
        ctx.shadowBlur = 0;
      }
    }

    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  setVizColorForType(type) {
    const colors = {
      bark:    { light: { r:245, g:158, b:11 },  dark: { r:180, g:100, b:5 } },
      growl:   { light: { r:251, g:113, b:133 }, dark: { r:180, g:40, b:60 } },
      whine:   { light: { r:244, g:63,  b:94 },  dark: { r:160, g:30, b:50 } },
      howl:    { light: { r:167, g:139, b:250 }, dark: { r:100, g:60, b:180 } },
      yip:     { light: { r:52,  g:211, b:153 }, dark: { r:5,   g:150, b:100 } },
      silence: { light: { r:6,   g:182, b:212 }, dark: { r:4,   g:120, b:140 } },
    };
    const c = colors[type] || colors.silence;
    this.targetVizColor = c.light;
    this.targetVizColorDark = c.dark;
  }

  updateVocalizationType(classification) {
    if (!classification || classification.type === 'silence') {
      this.vocalizationType.textContent = '—';
      this.vocalizationType.style.color = 'var(--t3)';
      this.setVizColorForType('silence');
      return;
    }

    let label = classification.type.toUpperCase();
    if (classification.subtype) label += ` · ${classification.subtype}`;

    const colorMap = {
      bark: 'var(--amber)', growl: 'var(--rose)', whine: 'var(--rose)',
      howl: 'var(--purple)', yip: 'var(--emerald)',
    };

    this.vocalizationType.textContent = label;
    this.vocalizationType.style.color = colorMap[classification.type] || 'var(--teal)';
    this.setVizColorForType(classification.type);
  }

  // ===== Detection badges =====

  updateDetectionBadges(bodyResult, audioResult) {
    this.detectionBadges.innerHTML = '';

    if (bodyResult && bodyResult.detected) {
      const n = bodyResult.dogs.length;
      this.addBadge(`🐕 ${n} dog${n > 1 ? 's' : ''}`, 'badge-positive');

      const dog = bodyResult.dogs[0];
      if (dog && dog.posture) {
        const label = dog.posture.type.replace(/([A-Z])/g, ' $1').trim().toLowerCase();
        this.addBadge(label, 'badge-neutral');
      }
      if (dog && dog.motion && dog.motion.level !== 'unknown') {
        this.addBadge(dog.motion.pattern.replace(/_/g, ' '), 'badge-neutral');
      }
    }

    if (audioResult && audioResult.classification &&
        audioResult.classification.type !== 'silence' &&
        audioResult.classification.confidence > 0.3) {
      let lbl = `🔊 ${audioResult.classification.type}`;
      if (audioResult.classification.subtype) lbl += ` · ${audioResult.classification.subtype}`;
      this.addBadge(lbl, 'badge-alert');
    }
  }

  addBadge(text, cls) {
    const el = document.createElement('div');
    el.className = `detection-badge ${cls}`;
    el.textContent = text;
    this.detectionBadges.appendChild(el);
  }

  // ===== Detection pulse =====

  showDetectionPulse(x, y, size, color) {
    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    ring.style.cssText = `left:${x - size/2}px;top:${y - size/2}px;width:${size}px;height:${size}px;border-color:${color || 'var(--teal)'}`;
    this.detectionPulses.appendChild(ring);
    ring.addEventListener('animationend', () => ring.remove());
  }

  // ===== Assessment card =====

  updateAssessment(assessment) {
    if (!assessment || !assessment.hasSignal) {
      this.assessmentCard.classList.add('assessment-hidden');
      return;
    }

    this.assessmentCard.classList.remove('assessment-hidden');

    // State class
    this.assessmentCard.className = 'depth-card';
    // Re-apply custom styling from CSS (the card uses depth-card base, plus state)
    this.assessmentCard.id = 'assessment-card';
    if (assessment.cssClass) this.assessmentCard.classList.add(assessment.cssClass);

    this.stateIcon.textContent = assessment.icon || '❓';
    this.stateLabel.textContent = assessment.label;
    this.stateNeed.textContent = assessment.need;

    // Confidence ring
    const pct = assessment.confidence;
    const dashLen = (pct / 100) * this.arcCircumference;
    this.confidenceArc.setAttribute('stroke-dasharray', `${dashLen} ${this.arcCircumference}`);
    this.confidencePct.innerHTML = `${pct}<small>%</small>`;

    // Evidence tags
    this.evidenceList.innerHTML = '';
    (assessment.evidence || []).forEach(ev => {
      const tag = document.createElement('span');
      tag.className = `evidence-tag ${ev.type}`;
      tag.textContent = ev.signal;
      this.evidenceList.appendChild(tag);
    });
  }

  // ===== History =====

  addHistoryEntry(assessment) {
    if (!assessment || !assessment.hasSignal) return;

    const empty = this.historyLog.querySelector('.history-empty');
    if (empty) empty.remove();

    const time = new Date(assessment.timestamp);
    const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const topEvidence = (assessment.evidence || []).slice(0, 2).map(e => e.signal).join(' · ');

    const entry = document.createElement('div');
    entry.className = 'history-entry';
    entry.innerHTML = `
      <span class="history-icon">${assessment.icon}</span>
      <div class="history-info">
        <div class="history-state">${assessment.label}</div>
        <div class="history-detail">${topEvidence || 'Multiple signals'}</div>
      </div>
      <div class="history-meta">
        <span class="history-time">${timeStr}</span>
        <span class="history-conf">${assessment.confidence}%</span>
      </div>
    `;

    this.historyLog.insertBefore(entry, this.historyLog.firstChild);
    while (this.historyLog.children.length > 25) {
      this.historyLog.removeChild(this.historyLog.lastChild);
    }
  }

  clearHistory() {
    this.historyLog.innerHTML = '';
    this.initEmptyHistory();
  }

  initEmptyHistory() {
    if (!this.historyLog.children.length) {
      const el = document.createElement('div');
      el.className = 'history-empty';
      el.textContent = 'No readings yet';
      this.historyLog.appendChild(el);
    }
  }

  // ===== Mic unavailable indicator =====

  showMicUnavailable() {
    const strip = document.getElementById('audio-strip');
    if (!strip) return;
    let notice = document.getElementById('mic-unavailable');
    if (!notice) {
      notice = document.createElement('div');
      notice.id = 'mic-unavailable';
      notice.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(248,250,252,0.04);color:var(--t3);font-size:0.72rem;font-weight:600;z-index:2;pointer-events:none;border-radius:inherit;';
      notice.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> Mic unavailable';
      strip.style.position = 'relative';
      strip.appendChild(notice);
    }
  }

  hideMicUnavailable() {
    const notice = document.getElementById('mic-unavailable');
    if (notice) notice.remove();
  }

  // ===== Camera / scanning state =====

  hideStartPrompt() { this.startPrompt.classList.add('hidden'); }
  showStartPrompt(msg) {
    this.startPrompt.classList.remove('hidden');
    if (msg) this.startPrompt.querySelector('.start-label').textContent = msg;
  }
  showScanning(show) { this.scanOverlay.classList.toggle('hidden', !show); }
  setActive(active) { this.statusDot.className = active ? 'dot-active' : 'dot-inactive'; }

  // ===== Settings =====

  async populateCameraList() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(d => d.kind === 'videoinput');
      this.cameraSelect.innerHTML = '';
      cameras.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || `Camera ${i + 1}`;
        this.cameraSelect.appendChild(opt);
      });
      const rear = cameras.find(c => /back|rear|environment/i.test(c.label));
      if (rear) this.cameraSelect.value = rear.deviceId;
      return cameras;
    } catch (e) { return []; }
  }

  showSettings() { this.settingsSheet.classList.remove('hidden'); }
  hideSettings() { this.settingsSheet.classList.add('hidden'); }
}

window.UI = UI;
</script>
  <script>/**
 * Canid — Dog Behavioral Translator
 * Main application controller
 */
(function () {
  'use strict';

  const ui = new UI();
  const audioAnalyzer = new AudioAnalyzer();
  const bodyAnalyzer = new BodyAnalyzer();
  const fusion = new BehaviorFusion();

  // v0.3: CNN classifier + feedback
  const cnnClassifier = new CanidCNNClassifier({
    fallback: function(features) {
      // Fallback: return silence if model not loaded
      return { type: 'silence', subtype: 'silence', confidence: 0, allScores: {}, source: 'fallback' };
    }
  });
  const canidFeedback = new CanidFeedback({ promptDelay: 1200 });
  let lastCNNResult = null;
  let lastCNNFeatures = null;

  // Build 30-feature vector from AudioAnalyzer output (matches data-pipeline.py)
  function buildCNNFeatures(audioResult) {
    const features = new Float32Array(30);
    const mfccs = audioResult.mfccs || [];
    const sr = 44100;
    for (let i = 0; i < 13; i++) { features[i] = mfccs[i] || 0; }
    for (let i = 0; i < 13; i++) { features[13 + i] = 0.1; } // std approx
    features[26] = (audioResult.pitch || 0) / 4000;
    features[27] = (audioResult.centroid || 0) / (sr / 2);
    features[28] = audioResult.flatness || 0;
    features[29] = audioResult.energy || 0;
    return features;
  }

  let isRunning = false;
  let currentContext = 'none';
  let animFrameId = null;
  let lastAssessmentTime = 0;
  let assessmentInterval = 500;
  let lastHistoryState = null;
  let lastHistoryTime = 0;
  let historyMinInterval = 5000;
  let lastPulseTime = 0;

  let settings = {
    audioEnabled: true,
    videoEnabled: true,
    showOverlay: true,
    sensitivity: 5,
    cameraId: null
  };

  // ===== Init =====

  async function init() {
    // Inject logos
    injectLogos();

    // Show splash screen (runs in parallel, resolves after ~2.8s)
    const splashDone = CanidSplash.show();

    // Bind UI events while splash plays
    bindEvents();
    loadSettings();

    // v0.3: Init CNN classifier (async, non-blocking) + feedback UI
    cnnClassifier.load().then(loaded => {
      if (loaded) {
        console.log('[Canid v0.3] CNN classifier loaded');
      } else {
        console.log('[Canid v0.3] CNN not available, using rule-based fallback');
      }
    }).catch(e => console.warn('[Canid v0.3] CNN load error:', e));
    await canidFeedback.init();

    // Wait for splash to finish
    await splashDone;
    console.log('Canid v0.3 ready');
  }

  function injectLogos() {
    // Header logo
    const headerEl = document.getElementById('header-logo');
    if (headerEl) {
      headerEl.innerHTML = CanidLogo.headerMark({ height: 26, variant: 'gradient' });
    }

    // Settings footer logo
    const settingsLogoEl = document.getElementById('settings-logo');
    if (settingsLogoEl) {
      settingsLogoEl.innerHTML = CanidLogo.full({ height: 32, variant: 'white' });
    }
  }

  function bindEvents() {
    // Start analysis on tap
    document.getElementById('start-prompt').addEventListener('click', startAnalysis);

    // Stop analysis
    document.getElementById('btn-stop').addEventListener('click', stopAnalysis);

    // Context buttons
    document.querySelectorAll('.ctx-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ctx-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentContext = btn.dataset.context;
      });
    });

    // Settings
    document.getElementById('btn-settings').addEventListener('click', () => {
      ui.populateCameraList();
      ui.showSettings();
    });
    document.getElementById('btn-close-settings').addEventListener('click', () => {
      saveSettings();
      ui.hideSettings();
    });
    document.querySelector('.sheet-backdrop').addEventListener('click', () => {
      saveSettings();
      ui.hideSettings();
    });

    // Settings controls
    document.getElementById('sensitivity-slider').addEventListener('input', (e) => {
      settings.sensitivity = parseInt(e.target.value);
      document.getElementById('sensitivity-value').textContent = settings.sensitivity;
      updateSensitivity();
    });
    document.getElementById('audio-enabled').addEventListener('change', (e) => {
      settings.audioEnabled = e.target.checked;
    });
    document.getElementById('video-enabled').addEventListener('change', (e) => {
      settings.videoEnabled = e.target.checked;
    });
    document.getElementById('overlay-enabled').addEventListener('change', (e) => {
      settings.showOverlay = e.target.checked;
    });
    document.getElementById('camera-select').addEventListener('change', (e) => {
      settings.cameraId = e.target.value;
      if (isRunning) restartCamera();
    });

    // Clear history
    document.getElementById('btn-clear-history').addEventListener('click', () => {
      ui.clearHistory();
      fusion.stateHistory = [];
    });

    // v0.3: Training data / feedback stats
    document.getElementById('btn-training-data').addEventListener('click', () => {
      canidFeedback.showStats();
    });
  }

  // ===== Camera =====

  async function startCamera() {
    const constraints = {
      video: {
        facingMode: settings.cameraId ? undefined : { ideal: 'environment' },
        deviceId: settings.cameraId ? { exact: settings.cameraId } : undefined,
        width: { ideal: 640 },
        height: { ideal: 480 }
      }
    };

    try {
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      ui.cameraFeed.srcObject = stream;
      await new Promise(resolve => { ui.cameraFeed.onloadedmetadata = resolve; });
      return true;
    } catch (err) {
      console.error('Camera error:', err);
      let msg = 'Camera error — tap to retry';
      if (err.name === 'NotAllowedError') {
        msg = 'Camera permission denied — tap to retry';
      } else if (err.name === 'NotFoundError') {
        msg = 'No camera found on this device';
      } else if (err.name === 'OverconstrainedError') {
        msg = 'Camera doesn\'t support requested settings — tap to retry';
      }
      ui.showStartPrompt(msg);
      return false;
    }
  }

  async function restartCamera() {
    if (ui.cameraFeed.srcObject) {
      ui.cameraFeed.srcObject.getTracks().forEach(t => t.stop());
    }
    await startCamera();
  }

  // ===== Analysis pipeline =====

  async function startAnalysis() {
    if (isRunning) return;

    ui.showStartPrompt('Initializing…');

    const cameraOk = await startCamera();
    if (!cameraOk) return;
    ui.hideStartPrompt();
    ui.showScanning(true);

    if (settings.audioEnabled) {
      const audioOk = await audioAnalyzer.start();
      if (!audioOk) {
        console.warn('Audio unavailable');
        settings.audioEnabled = false;
        ui.showMicUnavailable();
      }
    }

    if (settings.videoEnabled) {
      const modelOk = await bodyAnalyzer.init(ui.cameraFeed, ui.overlayCanvas);
      if (modelOk) {
        bodyAnalyzer.start();
      } else {
        console.warn('Body model unavailable');
        settings.videoEnabled = false;
      }
    }

    isRunning = true;
    ui.setActive(true);
    document.getElementById('btn-stop').classList.remove('hidden');
    analysisLoop();
  }

  async function analysisLoop() {
    if (!isRunning) return;

    const now = performance.now();

    // Audio (every frame)
    let audioResult = null;
    if (settings.audioEnabled) {
      audioResult = audioAnalyzer.analyze();
      if (audioResult) {
        // v0.3: CNN classification (falls back to rule-based if model not loaded)
        const cnnFeatures = buildCNNFeatures(audioResult);
        const cnnResult = cnnClassifier.classify(cnnFeatures);
        if (cnnResult.source === 'cnn' && cnnResult.type !== 'silence') {
          // Override rule-based with CNN result
          audioResult.classification = {
            type: cnnResult.type,
            subtype: cnnResult.subtype,
            confidence: cnnResult.confidence,
            features: audioResult.classification ? audioResult.classification.features : {},
            cnnScores: cnnResult.allScores
          };
          lastCNNResult = cnnResult;
          lastCNNFeatures = cnnFeatures;
        }
        const waveform = audioAnalyzer.getWaveformData();
        ui.drawAudioVisualization(waveform, audioResult.energy, audioResult.isVocalizing);
        ui.updateVocalizationType(audioResult.classification);
      }
    } else {
      ui.drawAudioVisualization(null, 0, false);
    }

    // Body (throttled internally)
    let bodyResult = null;
    if (settings.videoEnabled) {
      bodyResult = await bodyAnalyzer.analyze();
      bodyAnalyzer.drawOverlay(settings.showOverlay);

      // Pulse effect on new detection
      if (bodyResult && bodyResult.detected && now - lastPulseTime > 2000) {
        lastPulseTime = now;
        bodyResult.dogs.forEach(dog => {
          const [bx, by, bw, bh] = dog.bbox;
          const videoEl = ui.cameraFeed;
          const scaleX = videoEl.clientWidth / videoEl.videoWidth;
          const scaleY = videoEl.clientHeight / videoEl.videoHeight;
          const cx = (bx + bw / 2) * scaleX;
          const cy = (by + bh / 2) * scaleY;
          const size = Math.max(bw * scaleX, bh * scaleY) * 0.6;
          ui.showDetectionPulse(cx, cy, size, 'rgba(59,130,246,0.4)');
        });
      }
    }

    // Full assessment (throttled)
    if (now - lastAssessmentTime > assessmentInterval) {
      lastAssessmentTime = now;

      const assessment = fusion.assess(audioResult, bodyResult, currentContext);
      ui.updateAssessment(assessment);
      ui.updateDetectionBadges(bodyResult, audioResult);

      // v0.3: Trigger feedback prompt after assessment
      if (assessment && assessment.hasSignal && lastCNNResult && lastCNNFeatures) {
        canidFeedback.show(lastCNNResult, lastCNNFeatures);
      }

      if (assessment && assessment.hasSignal) {
        ui.showScanning(false);
      }

      // History logging
      if (assessment && assessment.hasSignal) {
        if (assessment.state !== lastHistoryState || now - lastHistoryTime > 15000) {
          if (now - lastHistoryTime > historyMinInterval) {
            ui.addHistoryEntry(assessment);
            lastHistoryState = assessment.state;
            lastHistoryTime = now;
          }
        }
      }
    }

    animFrameId = requestAnimationFrame(analysisLoop);
  }

  function stopAnalysis() {
    isRunning = false;
    if (animFrameId) {
      cancelAnimationFrame(animFrameId);
      animFrameId = null;
    }
    audioAnalyzer.stop();
    bodyAnalyzer.stop();
    if (ui.cameraFeed.srcObject) {
      ui.cameraFeed.srcObject.getTracks().forEach(t => t.stop());
      ui.cameraFeed.srcObject = null;
    }
    ui.setActive(false);
    ui.showStartPrompt('Tap to start');
    ui.showScanning(false);
    document.getElementById('btn-stop').classList.add('hidden');
    ui.hideMicUnavailable();
  }

  // ===== Settings =====

  function updateSensitivity() {
    const factor = (11 - settings.sensitivity) / 5;
    audioAnalyzer.onsetThreshold = 0.05 * factor;
    audioAnalyzer.silenceThreshold = 0.02 * factor;
  }

  function saveSettings() {
    settings.audioEnabled = document.getElementById('audio-enabled').checked;
    settings.videoEnabled = document.getElementById('video-enabled').checked;
    settings.showOverlay = document.getElementById('overlay-enabled').checked;
    settings.sensitivity = parseInt(document.getElementById('sensitivity-slider').value);
    settings.cameraId = document.getElementById('camera-select').value || null;
    try { localStorage.setItem('canid-settings', JSON.stringify(settings)); } catch (e) {}
  }

  function loadSettings() {
    try {
      const saved = localStorage.getItem('canid-settings');
      if (saved) {
        Object.assign(settings, JSON.parse(saved));
        document.getElementById('audio-enabled').checked = settings.audioEnabled;
        document.getElementById('video-enabled').checked = settings.videoEnabled;
        document.getElementById('overlay-enabled').checked = settings.showOverlay;
        document.getElementById('sensitivity-slider').value = settings.sensitivity;
        document.getElementById('sensitivity-value').textContent = settings.sensitivity;
      }
    } catch (e) {}
  }

  // Boot
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
